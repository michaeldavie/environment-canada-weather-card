    <g class="ice-crystal delay-3">
      <g transform="translate(10,36) scale(0.6)">
        <g transform="rotate(0)">
          <line x1="0" y1="0" x2="0" y2="-6"/>
          <line x1="0" y1="-3" x2="2" y2="-4"/>
          <line x1="0" y1="-3" x2="-2" y2="-4"/>
        </g>
        <g transform="rotate(60)">

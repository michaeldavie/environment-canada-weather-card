         class="splash arc1"
         id="path2"
         style="-moz-animation-duration:1s;-moz-animation-iteration-count:infinite;-moz-animation-name:arc1;-moz-animation-timing-function:ease-out;-webkit-animation-duration:1s;-webkit-animation-iteration-count:infinite;-webkit-animation-name:arc1;-webkit-animation-timing-function:ease-out" />
      <path
         d="M 0,0 C 5.5557867,-3.062776 11.500906,-3.310661 16.875722,-1.4938394"
         class="splash arc2"
         id="path3"
         style="-moz-animation-delay:0.1s;-moz-animation-duration:1.1s;-moz-animation-iteration-count:infinite;-moz-animation-name:arc2;-moz-animation-timing-function:ease-out;-webkit-animation-delay:0.1s;-webkit-animation-duration:1.1s;-webkit-animation-iteration-count:infinite;-webkit-animation-name:arc2;-webkit-animation-timing-function:ease-out" />
      <path
         d="M 0,0 C -3.3214787,-1.4964852 -5.5527431,-2.8706079 -9.4399266,-0.51987147"
         class="splash arc3"
         id="path4" />
      <path
         d="M 0,0 C 5.0691707,-0.96292362 8.8536252,-0.40564951 13.199621,2.6989317"
         class="splash arc4"
         id="path5"
         style="-moz-animation-delay:0.12s;-moz-animation-duration:1.15s;-moz-animation-iteration-count:infinite;-moz-animation-name:arc4;-moz-animation-timing-function:ease-out;-webkit-animation-delay:0.12s;-webkit-animation-duration:1.15s;-webkit-animation-iteration-count:infinite;-webkit-animation-name:arc4;-webkit-animation-timing-function:ease-out" />
      <!-- Droplets -->
      <path
         d="M 0,0 C -2.6145768,-5.481127 -6.7233822,-9.1364913 -12.196767,-10.859615"
         class="drop"
         id="path6" />
      <path
         d="M 0,0 C 6.8254873,-1.9104451 11.771203,-1.2288952 17.14984,1.7300138"
         class="drop"
         id="path7" />
      <path
         d="M 0,0 C -2.4312185,-3.7286713 -7.1019633,-5.0275088 -12.019642,-2.5303808"
         class="drop"
         id="path8" />
      <path
         d="M 0,0 C 4.491804,-5.0437349 13.861122,-6.4468097 21.717035,-3.2014931"
         class="drop"
         id="path9" />
      <path
         d="M 0,0 C -4.0799449,-0.73001381 -7.3398807,-0.02010112 -9.9999998,2.8296005"
         class="drop"
         id="path10" />
      <path
         d="M 0,0 C 4.8930004,0.43848691 8.6781698,1.8057984 11.14984,4.7898577"
         class="drop"
         id="path11" />
    </g>
    <g
       id="tornado"
       fill="#91c0f8"
       stroke="#fff"
       style="-moz-animation-duration:3s;-moz-animation-iteration-count:infinite;-moz-animation-name:tornado;-moz-animation-timing-function:linear;-webkit-animation-duration:3s;-webkit-animation-iteration-count:infinite;-webkit-animation-name:tornado;-webkit-animation-timing-function:linear">
      <path
         id="Polygon"
         transform="translate(20,-15) scale(1.75, 1.75)"
         d="m9.239 0h2.1597c1.403 0 2.7694 0.44812 3.9 1.279l0.07492 0.055065c0.84792 0.62321 1.0301 1.8158 0.40688 2.6637-0.06273 0.085346-0.13246 0.16531-0.20848 0.23907l-2.8266 2.7425c-1.0913 1.0589-1.8597 2.4058-2.2157 3.8841-0.35503 1.4743-1.1473 2.8068-2.2729 3.823l-3.1203 2.8168-1.9597 1.3737c-0.85678 0.60058-2.0382 0.3929-2.6388-0.46388-0.5411-0.77192-0.43235-1.8242 0.25517-2.4692l1.0781-0.9966c1.2556-1.1607 1.9695-2.793 1.9695-4.5029 0-1.7724-0.33249-3.529-0.98022-5.1788l-1.5105-3.8473c-0.20966-0.53401 0.053275-1.1369 0.58729-1.3465 0.12094-0.047481 0.24971-0.071854 0.37963-0.071854h6.922z" />
    </g>
  </g>
</svg>

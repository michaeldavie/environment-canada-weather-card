<svg
   width="56"
   height="48"
   version="1.1"
   id="svg12"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs2">
    <filter
       id="blur"
       x="-0.19777855"
       y="-0.11824566"
       width="1.3924216"
       height="1.2968955">
      <feGaussianBlur
         in="SourceAlpha"
         stdDeviation="3"
         id="feGaussianBlur1" />
      <feOffset
         dx="0"
         dy="4"
         result="offsetblur"
         id="feOffset1" />
      <feComponentTransfer
         id="feComponentTransfer1">
        <feFuncA
           slope="0.05"
           type="linear"
           id="feFuncA1" />
      </feComponentTransfer>
      <feMerge
         id="feMerge2">
        <feMergeNode
           id="feMergeNode1" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode2" />
      </feMerge>
    </filter>
    <style
       type="text/css"
       id="style2"><![CDATA[

            /*
            ** Tornado
            */

            @keyframes tornado {
                0% {
                    -webkit-transform: translate(-5px, 30px) scale(1.0);
                    -moz-transform: translate(-5px, 30px) scale(1.0);
                    -ms-transform: translate(-5px, 30px) scale(1.0);
                    transform: translate(-5px, 30px) scale(1.0);
                }

                33% {
                    -webkit-transform: translate(-4px, 30px) scale(1.1);
                    -moz-transform: translate(-4px, 30px) scale(1.1);
                    -ms-transform: translate(-4px, 30px) scale(1.1);
                    transform: translate(-4px, 30px) scale(1.1);
                }

                66% {
                    -webkit-transform: translate(-6px, 30px) scale(1.1);
                    -moz-transform: translate(-6px, 30px) scale(1.1);
                    -ms-transform: translate(-6px, 30px) scale(1.1);
                    transform: translate(-6px, 30px) scale(1.1);
                }

                100% {
                    -webkit-transform: translate(-5px, 30px) scale(1.0);
                    -moz-transform: translate(-5px, 30px) scale(1.0);
                    -ms-transform: translate(-5px, 30px) scale(1.0);
                    transform: translate(-5px, 30px) scale(1.0);
                }
            }

            #tornado {
                -webkit-animation-name: tornado;
                -moz-animation-name: tornado;
                animation-name: tornado;
                -webkit-animation-duration: 3s;
                -moz-animation-duration: 3s;
                animation-duration: 3s;
                -webkit-animation-timing-function: linear;
                -moz-animation-timing-function: linear;
                animation-timing-function: linear;
                -webkit-animation-iteration-count: infinite;
                -moz-animation-iteration-count: infinite;
                animation-iteration-count: infinite;
            }      

            .splash {
                stroke: #57a0ee;
                stroke-width: 2;
                stroke-linecap: round;
                fill: none;
                -webkit-animation-timing-function: ease-out;
                -moz-animation-timing-function: ease-out;
                animation-timing-function: ease-out;
                -webkit-animation-iteration-count: infinite;
                -moz-animation-iteration-count: infinite;
                animation-iteration-count: infinite;
            }

            .drop {
                stroke: #57a0ee;
                stroke-width: 2;
                stroke-linecap: round;
                fill: none;
            }

            /* Main arcs */
            @keyframes arc1 { 0%{transform:translate(0,0);opacity:0.6} 40%{transform:translate(-20,-15);opacity:1} 60%{transform:translate(-12,-8);opacity:1} 100%{transform:translate(0,0);opacity:0} }
            @keyframes arc2 { 0%{transform:translate(0,0);opacity:0.5} 40%{transform:translate(20,-12);opacity:1} 60%{transform:translate(10,-6);opacity:1} 100%{transform:translate(0,0);opacity:0} }
            @keyframes arc3 { 0%{transform:translate(0,0);opacity:0.5} 40%{transform:translate(-15,-10);opacity:1} 60%{transform:translate(-8,-5);opacity:1} 100%{transform:translate(0,0);opacity:0} }
            @keyframes arc4 { 0%{transform:translate(0,0);opacity:0.5} 40%{transform:translate(15,-8);opacity:1} 60%{transform:translate(8,-4);opacity:1} 100%{transform:translate(0,0);opacity:0} }

            .arc1 {
                -webkit-animation-name: arc1;
                -moz-animation-name: arc1;
                animation-name: arc1;
                -webkit-animation-duration: 1s;
                -moz-animation-duration: 1s;
                animation-duration: 1s;
            }
            .arc2 {
                -webkit-animation-name: arc2;
                -moz-animation-name: arc2;
                animation-name: arc2;
                -webkit-animation-duration: 1.1s;
                -moz-animation-duration: 1.1s;
                animation-duration: 1.1s;
                -webkit-animation-delay: 0.1s;
                -moz-animation-delay: 0.1s;
                animation-delay: 0.1s;
            }
            .arc3 {
                -webkit-animation-name: arc3;
                -moz-animation-name: arc3;
                animation-name: arc3;
                -webkit-animation-duration: 1.05s;
                -moz-animation-duration: 1.05s;
                animation-duration: 1.05s;
                -webkit-animation-delay: 0.05s;
                -moz-animation-delay: 0.05s;
                animation-delay: 0.05s;
            }
            .arc4 {
                -webkit-animation-name: arc4;
                -moz-animation-name: arc4;
                animation-name: arc4;
                -webkit-animation-duration: 1.15s;
                -moz-animation-duration: 1.15s;
                animation-duration: 1.15s;
                -webkit-animation-delay: 0.12s;
                -moz-animation-delay: 0.12s;
                animation-delay: 0.12s;
            }
        ]]></style>
  </defs>
  <g

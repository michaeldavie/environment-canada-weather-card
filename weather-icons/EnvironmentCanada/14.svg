<svg width="56" height="48" version="1.1" xmlns="http://www.w3.org/2000/svg">
   <defs>
      <filter id="blur" x="-.24684" y="-.22776" width="1.4937" height="1.5756">
         <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
         <feOffset dx="0" dy="4" result="offsetblur" />
         <feComponentTransfer>
            <feFuncA slope="0.05" type="linear" />
         </feComponentTransfer>
         <feMerge>
            <feMergeNode />
            <feMergeNode in="SourceGraphic" />
         </feMerge>
      </filter>
      <style type="text/css">
         <![CDATA[
         /*
      /*
** CLOUDS
*/
      @keyframes am-weather-cloud {
        0% {
          -webkit-transform: translate(0px, 0px);
          -moz-transform: translate(0px, 0px);
          -ms-transform: translate(0px, 0px);
          transform: translate(0px, 0px);
        }

        50% {
          -webkit-transform: translate(2px, 0px);
          -moz-transform: translate(2px, 0px);
          -ms-transform: translate(2px, 0px);
          transform: translate(2px, 0px);
        }

        100% {
          -webkit-transform: translate(0px, 0px);
          -moz-transform: translate(0px, 0px);
          -ms-transform: translate(0px, 0px);
          transform: translate(0px, 0px);
        }
      }

      .am-weather-cloud {
        -webkit-animation-name: am-weather-cloud;
        -moz-animation-name: am-weather-cloud;
        animation-name: am-weather-cloud;
        -webkit-animation-duration: 3s;
        -moz-animation-duration: 3s;
        animation-duration: 3s;
        -webkit-animation-timing-function: linear;
        -moz-animation-timing-function: linear;
        animation-timing-function: linear;
        -webkit-animation-iteration-count: infinite;
        -moz-animation-iteration-count: infinite;
        animation-iteration-count: infinite;
      }

         /*
** ICICLE
*/
         @keyframes am-weather-icicle-1 {
            0%   { transform: translate(-5px,0px); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translate(-5px,8px); opacity: 0; }
         }

         @keyframes am-weather-icicle-2 {
            0%   { transform: translate(0px,-2px); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translate(0px,8px); opacity: 0; }
         }

         @keyframes am-weather-icicle-3 {
            0%   { transform: translate(5px,-1px); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translate(5px,8px); opacity: 0; }
         }

         .am-weather-icicle-1 {
            -webkit-animation-name: am-weather-icicle-1;
            -moz-animation-name: am-weather-icicle-1;
            -ms-animation-name: am-weather-icicle-1;
            animation-name: am-weather-icicle-1;
         }

         .am-weather-icicle-2 {
            -webkit-animation-name: am-weather-icicle-2;
            -moz-animation-name: am-weather-icicle-2;
            -ms-animation-name: am-weather-icicle-2;
            animation-name: am-weather-icicle-2;
            -webkit-animation-delay: 0.25s;
            -moz-animation-delay: 0.25s;
            -ms-animation-delay: 0.25s;
            animation-delay: 0.25s;
         }

         .am-weather-icicle-3 {
            -webkit-animation-name: am-weather-icicle-3;
            -moz-animation-name: am-weather-icicle-3;
            -ms-animation-name: am-weather-icicle-3;
            animation-name: am-weather-icicle-3;
         }

         .icicle-base {
            -webkit-animation-duration: 0.75s;
            -moz-animation-duration: 0.75s;
            -ms-animation-duration: 0.75s;
            animation-duration: 0.75s;
            -webkit-animation-timing-function: linear;
            -moz-animation-timing-function: linear;
            -ms-animation-timing-function: linear;
            animation-timing-function: linear;
            -webkit-animation-iteration-count: infinite;
            -moz-animation-iteration-count: infinite;
            -ms-animation-iteration-count: infinite;
            animation-iteration-count: infinite;
         }
         ]]>
      </style>
   </defs>
   <g transform="translate(16,-2)" filter="url(#blur)">
    <g class="am-weather-cloud"
      style="-moz-animation-duration:3s;-moz-animation-iteration-count:infinite;-moz-animation-name:am-weather-cloud;-moz-animation-timing-function:linear;-webkit-animation-duration:3s;-webkit-animation-iteration-count:infinite;-webkit-animation-name:am-weather-cloud;-webkit-animation-timing-function:linear">
      <path transform="translate(-20,-11)"
        d="m47.7 35.4c0-4.6-3.7-8.2-8.2-8.2-1 0-1.9 0.2-2.8 0.5-0.3-3.4-3.1-6.2-6.6-6.2-3.7 0-6.7 3-6.7 6.7 0 0.8 0.2 1.6 0.4 2.3-0.3-0.1-0.7-0.1-1-0.1-3.7 0-6.7 3-6.7 6.7 0 3.6 2.9 6.6 6.5 6.7h17.2c4.4-0.5 7.9-4 7.9-8.4z"
        fill="#57a0ee" stroke="#fff" stroke-linejoin="round" stroke-width="1.2" />
    </g>
      <g transform="rotate(10,-247.39,200.17) translate(-20,-6.5)" fill="#91c0f8" stroke="none">
         <polygon class="icicle-base am-weather-icicle-1" points="-1.5,0 1.5,0 0,4" />
         <polygon class="icicle-base am-weather-icicle-2" points="-1.5,0 1.5,0 0,4" />
         <polygon class="icicle-base am-weather-icicle-3" points="-1.5,0 1.5,0 0,4" />
         <polygon class="icicle-base am-weather-icicle-1" points="-1.5,0 1.5,0 0,4" />
         <polygon class="icicle-base am-weather-icicle-2" points="-1.5,0 1.5,0 0,4" />
         <polygon class="icicle-base am-weather-icicle-3" points="-1.5,0 1.5,0 0,4" />
      </g>
   </g>
</svg>